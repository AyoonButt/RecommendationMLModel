name: Build and Push ML Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Core Recommendations
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.core-recommendations
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ml-core:latest
            ${{ secrets.DOCKER_USERNAME }}/ml-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-social:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Social Recommendations
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.social-recommendations
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ml-social:latest
            ${{ secrets.DOCKER_USERNAME }}/ml-social:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
