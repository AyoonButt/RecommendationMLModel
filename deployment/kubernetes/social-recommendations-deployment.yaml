apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-recommendations
  labels:
    app: social-recommendations
    component: recommendation-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: social-recommendations
  template:
    metadata:
      labels:
        app: social-recommendations
    spec:
      containers:
      - name: social-recommendations
        image: recommendation-system/social-recommendations:latest
        ports:
        - containerPort: 8081
        env:
        - name: PORT
          value: "8081"
        - name: COMMENT_ANALYSIS_SERVICE_URL
          value: "http://comment-analysis-service:8080"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: social-recommendations-service
spec:
  selector:
    app: social-recommendations
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
  type: ClusterIP