apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-recommendations
  labels:
    app: core-recommendations
    component: recommendation-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-recommendations
  template:
    metadata:
      labels:
        app: core-recommendations
    spec:
      containers:
      - name: core-recommendations
        image: recommendation-system/core-recommendations:latest
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: REDIS_HOST
          value: "redis-service"
        - name: SOCIAL_SERVICE_URL
          value: "http://social-recommendations-service:8081"
        - name: COMMENT_SERVICE_URL
          value: "http://comment-analysis-service:8080"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: core-recommendations-service
spec:
  selector:
    app: core-recommendations
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: ClusterIP