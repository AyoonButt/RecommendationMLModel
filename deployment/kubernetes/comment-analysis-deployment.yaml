apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-analysis
  labels:
    app: comment-analysis
    component: recommendation-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comment-analysis
  template:
    metadata:
      labels:
        app: comment-analysis
    spec:
      containers:
      - name: comment-analysis
        image: recommendation-system/comment-analysis:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: BERT_MODEL
          value: "nlptown/bert-base-multilingual-uncased-sentiment"
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: comment-analysis-service
spec:
  selector:
    app: comment-analysis
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP